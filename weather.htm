<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Girish Gaur - Advisor at Niva Bupa Health Insurance, Saharanpur, India">
    <title>WEATHER APP IN IS</title>
                  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

      </head>
      <body>
        <style>
            *{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'DM Sans', sans-serif;
                border: none;
                outline: none;
            }
            body{
                min-height: 100vh;
                background: linear-gradient(135deg, #71b7e6, #9b59b6);
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .container{
                width: 400px;
                background: #fff;
                height: min-content;
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0 5px 10px rgba(0,0,0,0.15);
            }

 .search-box{
                width: 100%;
                height: min-content;
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: #f0f0f0;
                border-radius: 5px;
               
            }
            .search-box input{
                width:84%;
                font-size: 20px;
                text-transform: capitalize;
                color:#000;
                background: #e6f5fb;
                padding: 12px 16px;
                border-radius: 14px;
                        }
                        .search-box input::placeholder {
                color: #000;
                        }

            .input-box{
                width: 100%;
                height: 100%;
                background: transparent;
                font-size: 18px;
            }
            .search-box button{
                width: 46px;
                height: 46px;
                background: #e6f5fb
                color: #000;
                border-radius: 50%;
                font-size: 20px;
                cursor: pointer;
            }
            .search-box button:hover{
                background: #71b7e6;
                color: #fff;
            }
            .weather-body{
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                margin-block: 20px;
            }
            .weather-body img{
                width:60%;

            }
            .weather-box{
                text-align: center;
                margin-block: 20px;
            }
        </style>
        <div class="container">
        
            <div class="header">
                <div class="weather-body">
                   <img src ="cloud.png" alt="weather icon" class="weather-img">
                   <div class="weather-box">
                        <p class="temperature">&#176;C</p>
                        <p class="description">Weather Description</p>
                    </div>
                </div>
                <div class="search-box">
                    <input type="text" placeholder="ENTER LOCATION" class="input-box">
                    

                    <button><i class="fas fa-search"></i></button>
                </div>
            </div>
        </div>
        
      </body>
</html>
